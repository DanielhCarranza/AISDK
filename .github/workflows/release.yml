name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  verify:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.2*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_PATH"
          echo "Selected: $XCODE_PATH"
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: |
          swift test 2>&1 | tee test-output.log || TEST_EXIT=$?
          if [ "${TEST_EXIT:-0}" -ne 0 ]; then
            if grep -q "Test run with .* passed" test-output.log; then
              echo "All tests passed (ignoring exit code $TEST_EXIT due to known toolchain issue)"
              exit 0
            fi
            exit $TEST_EXIT
          fi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine pre-release status
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a pre-release"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a stable release"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
