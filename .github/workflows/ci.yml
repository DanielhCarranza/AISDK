name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Pin to Xcode 16.2 to avoid swift test exit code bugs in newer betas
          XCODE_PATH=$(ls -d /Applications/Xcode_16.2*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_PATH"
          echo "Selected: $XCODE_PATH"
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: |
          swift test 2>&1 | tee test-output.log || TEST_EXIT=$?
          # Workaround: some Xcode versions exit 1 despite all tests passing
          if [ "${TEST_EXIT:-0}" -ne 0 ]; then
            if grep -q "Test run with .* passed" test-output.log; then
              echo "All tests passed (ignoring exit code $TEST_EXIT due to known toolchain issue)"
              exit 0
            fi
            exit $TEST_EXIT
          fi

  build-ios:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.2*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_PATH"

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme AISDK \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            | tail -20
